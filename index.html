<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#e9ddc0" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1d1810" media="(prefers-color-scheme: dark)" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- PWA: installable so iOS can deliver web-push (its only path), and for
         add-to-home-screen on Android/desktop. -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Rummle" />

    <!-- Knack type system: Yeseva One (wordmark) + Work Sans (UI + tiles) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Yeseva+One&family=Work+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <title>Rummle</title>

    <!-- Capture beforeinstallprompt as early as possible: Chromium can fire it
         before the React bundle mounts its own listener, and the event is only
         delivered once. Stash it so the install affordance can use it on mount. -->
    <script>
      window.__installPrompt = null;
      window.addEventListener("beforeinstallprompt", function (e) {
        e.preventDefault();
        window.__installPrompt = e;
        window.dispatchEvent(new Event("installpromptchange"));
      });
      window.addEventListener("appinstalled", function () {
        window.__installPrompt = null;
        window.dispatchEvent(new Event("installpromptchange"));
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
