name: Deploy preview to Firebase Hosting (PR)

# Builds the app and deploys it to a temporary Firebase Hosting preview
# channel, posting the preview URL on the pull request. Skips PRs from forks,
# where repository secrets are not available.

on: pull_request

permissions:
  checks: write
  contents: read
  pull-requests: write

concurrency:
  group: hosting-preview-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          # Pinned below 22.23.0: the June-2026 CVE-2026-48931 fix changed
          # http.Agent keep-alive reuse, tripping a false-positive
          # ERR_STREAM_PREMATURE_CLOSE in node-fetch@2 (under firebase-tools).
          # The non-idempotent retry then fails the hosting release with
          # FAILED_PRECONDITION. Unpin once nodejs/node#64004 lands in 22.x.
          node-version: 22.22.0
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          VITE_USE_EMULATOR: "false"
          VITE_FIREBASE_PROJECT_ID: rummle-prod
          VITE_FIREBASE_AUTH_DOMAIN: rummle-prod.firebaseapp.com
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_VAPID_PUBLIC_KEY: ${{ secrets.VITE_VAPID_PUBLIC_KEY }}
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_RUMMLE_PROD }}
          projectId: rummle-prod
          expires: 7d
          # >=15.22.3 carries the keep-alive premature-close mitigations.
          firebaseToolsVersion: ^15.22.3
